<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180" role="img" aria-label="Elite Mobile Car Detailing">
  <title>Elite Mobile Car Detailing</title>
  <!--
    Full logo — transparent background.
    Car silhouette paths use pathLength="1" so .icon-draw stroke animation works (§2.5).
    Colors: #1E5FFF = --color-brand; #F4F7FF = --color-text; #A4AEC4 = --color-text-muted
  -->

  <!-- Car silhouette — electric blue stroke, transparent fill -->
  <g transform="translate(8, 8)" fill="none" stroke="#1E5FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body outline (low sports car profile) -->
    <path class="icon-draw-path" pathLength="1"
      d="M20 110
         L28 110
         L32 94
         C42 70 62 52 88 46
         L138 38
         C158 34 178 34 200 38
         L268 48
         C292 52 310 60 322 74
         L348 104
         L368 108
         L388 108
         C392 108 396 112 396 116
         L396 120
         C396 124 392 128 388 128
         L362 128
         C356 140 344 148 330 148
         C316 148 304 140 298 128
         L148 128
         C142 140 130 148 116 148
         C102 148 90 140 84 128
         L52 128
         C44 128 38 122 38 114
         L20 114
         Z"
      stroke-dasharray="1" stroke-dashoffset="0"
    />
    <!-- Roof / cabin -->
    <path pathLength="1"
      d="M100 78 C116 56 148 44 178 42 L230 42 C258 42 286 52 302 72 L316 90 L96 90 Z"
      stroke-dasharray="1" stroke-dashoffset="0"
    />
    <!-- Windshield line -->
    <line x1="128" y1="88" x2="168" y2="46" stroke-opacity="0.6" />
    <!-- Rear window line -->
    <line x1="290" y1="88" x2="258" y2="46" stroke-opacity="0.6" />
    <!-- Side window division -->
    <line x1="208" y1="44" x2="210" y2="88" stroke-opacity="0.4" />
    <!-- Front wheel arch -->
    <path d="M56 128 A32 32 0 0 1 144 128" />
    <!-- Rear wheel arch -->
    <path d="M268 128 A32 32 0 0 1 356 128" />
    <!-- Front wheel -->
    <circle cx="100" cy="138" r="22" />
    <circle cx="100" cy="138" r="10" stroke-opacity="0.5" />
    <!-- Rear wheel -->
    <circle cx="312" cy="138" r="22" />
    <circle cx="312" cy="138" r="10" stroke-opacity="0.5" />
    <!-- Headlight -->
    <path d="M24 98 L40 94 L44 102 L28 106 Z" />
    <!-- Tail light -->
    <path d="M374 106 L392 104 L396 112 L378 114 Z" stroke-opacity="0.8" />
    <!-- Ground line -->
    <line x1="14" y1="160" x2="410" y2="160" stroke-opacity="0.2" />
    <!-- Undercarriage detail -->
    <path d="M60 128 L350 128" stroke-opacity="0.25" stroke-width="1" />
  </g>

  <!-- "ELITE" wordmark — bold, brand blue + near-white -->
  <text x="430" y="100"
    font-family="'Outfit Variable', system-ui, -apple-system, sans-serif"
    font-size="64"
    font-weight="800"
    letter-spacing="-2"
    text-anchor="middle"
    fill="#1E5FFF"
  >ELITE</text>

  <!-- "MOBILE CAR DETAILING" subtitle -->
  <text x="430" y="128"
    font-family="'Outfit Variable', system-ui, -apple-system, sans-serif"
    font-size="13"
    font-weight="500"
    letter-spacing="3"
    text-anchor="middle"
    fill="#A4AEC4"
  >MOBILE CAR DETAILING</text>

  <!-- Brand diamond accent -->
  <polygon points="508,150 512,156 508,162 504,156"
    fill="#1E5FFF" opacity="0.7" />
</svg>
